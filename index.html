<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/img/favicon.ico" />
    <link rel="stylesheet" href="index.css">
    <title>Pokemon Mega Ⅱ</title>

    <script type="text/javascript" src="jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="index.min.js"></script>
    <script type="text/javascript" src="xdsdk-help.js"></script>
</head>

<body>
    <div class="game-container">
        <div class="game-iframe">  
            <iframe id="gameIframe" scrolling="no"></iframe>
            
            <div class="border">
                </div>
        </div>
    </div>

    <script>
        // Giữ lại logic load Service Worker để đảm bảo game chạy mượt
        window.addEventListener('load', async () => {
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('/js/sw.js');
                } catch (e) {
                    console.log('SW register failed');
                }
            }
        });
    </script>
</body>
</html>
